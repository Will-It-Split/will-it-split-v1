<style>
*{image-rendering:pixelated;-ms-interpolation-mode:nearest-neighbor;box-sizing:border-box;}
:root{--panel-bg:rgba(26,42,26,0.75);--panel-border:#4a6a3a;--text-light:#d4e8c4;--text-bright:#fff;--hp-green:#4caf50;--hp-red:#e74c3c;--hp-bg:#1a1a1a;--coin-color:#ffd700;}
html,body{margin:0;padding:0;overflow:hidden;width:100vw;height:100vh;background:#0d1b0d;}
body{font-family:'Press Start 2P',monospace;}
.pixel-btn{font-family:'Press Start 2P',monospace;font-size:10px;padding:10px 16px;border:3px solid;border-color:#8bac6f #2d5a27 #2d5a27 #8bac6f;background:#3d6b2e;color:#d4e8c4;cursor:pointer;text-transform:uppercase;transition:transform .05s;min-height:44px;min-width:44px;text-align:center;line-height:1.4;position:relative;}
.pixel-btn:hover{background:#4a8c3f;}
.pixel-btn:active{transform:scale(.95);border-color:#2d5a27 #8bac6f #8bac6f #2d5a27;}
.pixel-btn.gold{border-color:#ffe44d #b8860b #b8860b #ffe44d;background:#daa520;color:#3d2817;}
.pixel-btn.gold:hover{background:#ffd700;}
.pixel-btn.red{border-color:#ff8866 #8b2500 #8b2500 #ff8866;background:#cc4422;color:#ffe0d0;}
.pixel-btn.red:hover{background:#dd5533;}
.pixel-btn:disabled{opacity:.5;cursor:not-allowed;border-color:#555 #333 #333 #555;background:#444;color:#888;}
.pixel-panel{background:var(--panel-bg);border:3px solid var(--panel-border);box-shadow:inset 0 0 0 2px rgba(139,172,111,.15);}
.hud-panel{background:rgba(26,42,26,0.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:2px solid rgba(74,106,58,0.5);border-radius:4px;padding:6px 12px;}
@keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.3)}}
.float-text{position:absolute;font-family:'Press Start 2P',monospace;font-size:14px;color:var(--coin-color);text-shadow:2px 2px 0 #3d2817;pointer-events:none;animation:float-up 1s ease-out forwards;z-index:100;}
.float-dmg{position:absolute;font-family:'Press Start 2P',monospace;font-size:12px;text-shadow:2px 2px 0 #000;pointer-events:none;animation:float-up .8s ease-out forwards;z-index:100;}
.float-dmg.crit{font-size:18px;color:#ffe44d!important;}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px rgba(255,215,0,.4)}50%{box-shadow:0 0 20px rgba(255,215,0,.9)}}
.daily-glow{animation:pulse-glow 1.5s ease-in-out infinite;}
@keyframes shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-6px) rotate(-1deg)}30%{transform:translateX(5px) rotate(1deg)}50%{transform:translateX(-4px)}70%{transform:translateX(3px)}90%{transform:translateX(-2px)}}
.screen-shake{animation:shake .35s ease-out;}
@keyframes level-up-text{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.2)}70%{transform:scale(.95)}100%{opacity:0;transform:scale(1) translateY(-40px)}}
.level-up-anim{animation:level-up-text 1.8s ease-out forwards;position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:#ffd700;text-shadow:3px 3px 0 #3d2817,-1px -1px 0 #ffe44d;pointer-events:none;z-index:200;white-space:nowrap;}
@keyframes title-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes leaf-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:.8}50%{transform:translateY(50vh) rotate(180deg) translateX(30px);opacity:.6}100%{transform:translateY(100vh) rotate(360deg) translateX(-10px);opacity:0}}
.leaf{position:absolute;pointer-events:none;z-index:5;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;}
.modal-content{background:#1a2a1a;border:4px solid #4a6a3a;max-width:540px;width:100%;padding:24px;position:relative;max-height:90vh;overflow-y:auto;}
canvas{display:block;}
.hp-bar-container{width:200px;height:16px;background:var(--hp-bg);border:2px solid #555;position:relative;margin:0 auto;}
.hp-bar-fill{height:100%;background:var(--hp-green);transition:width .15s ease-out;}
.hp-bar-fill.low{background:#e7a020;}
.hp-bar-fill.critical{background:var(--hp-red);}
.hp-bar-fill.boss{background:linear-gradient(90deg,#e74c3c,#ffd700);}
#game-canvas{touch-action:none;cursor:crosshair;}
@keyframes discovery-pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}60%{transform:translate(-50%,-50%) scale(.95)}100%{opacity:0;transform:translate(-50%,-50%) scale(1) translateY(-30px)}}
.discovery-anim{animation:discovery-pop 2.5s ease-out forwards;position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:200;white-space:nowrap;text-align:center;}
@keyframes border-flash{0%{box-shadow:inset 0 0 30px var(--flash-color)}100%{box-shadow:none}}
.powerup-flash{animation:border-flash .5s ease-out;}
.pu-btn{position:relative;width:48px;height:48px;border:2px solid #555;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;font-size:16px;transition:all .2s;}
.pu-btn.available{border-color:#8bac6f;background:rgba(42,58,26,0.7);animation:pulse-glow 2s ease-in-out infinite;}
.pu-btn.active{border-color:#ffd700;background:rgba(58,74,10,0.7);}
.pu-btn.cooldown{opacity:.5;cursor:not-allowed;}
.pu-btn .cd-text{position:absolute;font-family:'Press Start 2P';font-size:7px;color:#ff8866;bottom:2px;}
.pu-bar{position:absolute;bottom:0;left:0;height:3px;background:#ffd700;transition:width .1s linear;}
@keyframes gold-flash{0%{background:rgba(255,215,0,.3)}100%{background:transparent}}
.gold-flash{animation:gold-flash .6s ease-out;}
@keyframes combo-pop{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(1) translateY(-30px)}}
.combo-text{position:absolute;font-family:'Press Start 2P';font-size:16px;color:#ff6622;text-shadow:2px 2px 0 #000;pointer-events:none;animation:combo-pop .8s ease-out forwards;z-index:150;}
.watermark{position:absolute;bottom:8px;right:8px;font-family:'Press Start 2P';font-size:5px;color:rgba(139,172,111,.25);pointer-events:none;z-index:40;white-space:nowrap;}
.collection-item{transition:all .2s;}
.collection-item.locked{opacity:.35;filter:grayscale(1);}
.sound-btn{background:none;border:none;cursor:pointer;color:#8bac6f;padding:4px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
@keyframes unlock-pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}40%{transform:translate(-50%,-50%) scale(.95)}60%{transform:translate(-50%,-50%) scale(1.05)}80%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1) translateY(-20px)}}
.unlock-anim{animation:unlock-pop 3s ease-out forwards;position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:200;white-space:nowrap;text-align:center;}
.progress-bar-mini{width:100%;height:6px;background:#1a1a1a;border:1px solid #333;border-radius:2px;overflow:hidden;}
.progress-bar-mini-fill{height:100%;background:#4caf50;transition:width .3s;}
@keyframes notif-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.notif-dot{position:absolute;top:-4px;left:-4px;width:10px;height:10px;background:#e74c3c;border-radius:50%;border:2px solid rgba(26,42,26,.75);animation:notif-pulse 1.5s ease-in-out infinite;z-index:10;pointer-events:none;}
@keyframes boss-entrance{0%{opacity:0;transform:scale(3)}40%{opacity:1;transform:scale(.9)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
.boss-entrance-text{animation:boss-entrance 1.2s ease-out forwards;position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:200;white-space:nowrap;text-align:center;}
@keyframes affinity-float{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
.affinity-indicator{position:absolute;font-family:'Press Start 2P';font-size:10px;pointer-events:none;animation:affinity-float 1s ease-out forwards;z-index:100;}
@keyframes toast-in{0%{transform:translateX(120%)}10%{transform:translateX(0)}90%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
.achievement-toast{position:fixed;bottom:80px;right:16px;background:#2a3a1a;border:3px solid #ffd700;padding:12px 16px;z-index:600;animation:toast-in 3.5s ease forwards;max-width:280px;}
.type-badge{font-family:'Press Start 2P';font-size:6px;padding:2px 6px;border-radius:2px;display:inline-block;}
.type-Woodsman{background:#2d5a27;color:#8bac6f;}
.type-Lumberjack{background:#5a3a1a;color:#d4b86a;}
.type-Mystic{background:#3a1a5a;color:#bb88ff;}
.type-Elemental{background:#1a3a5a;color:#66bbff;}
.type-Precision{background:#3a3a3a;color:#cccccc;}
.type-Brute{background:#5a1a1a;color:#ff8866;}
.type-ALL{background:linear-gradient(90deg,#daa520,#7a4aaa);color:#fff;}
.cat-Softwood{color:#8bac6f;}
.cat-Hardwood{color:#c4a35a;}
.cat-Exotic{color:#ff8866;}
.cat-Magical{color:#bb88ff;}
.cat-Boss{color:#e74c3c;}
@keyframes log-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.log-hit-shake{animation:log-shake .15s ease-out;}
</style>

function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}

now+i*.15);o.stop(now+i*.15+.5)});break}case'daily':{[1047,988,880,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.1,now+i*.1);g.gain.exponentialRampToValueAtTime(.001,now+i*.1+.25);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.1);o.stop(now+i*.1+.3)});break}case'critical':{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.setValueAtTime(60,now);o.frequency.exponentialRampToValueAtTime(30,now+.15);g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+.25);break}case'discover':{[440,554,659,880].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.12,now+i*.12);g.gain.exponentialRampToValueAtTime(.001,now+i*.12+.3);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.12);o.stop(now+i*.12+.35)});break}case'unlock':{[523,659,784,1047].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.18,now+i*.15);g.gain.exponentialRampToValueAtTime(.001,now+i*.15+.5);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.15);o.stop(now+i*.15+.6)});break}case'boss':{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(80,now);o.frequency.exponentialRampToValueAtTime(40,now+.8);g.gain.setValueAtTime(.25,now);g.gain.exponentialRampToValueAtTime(.001,now+.9);o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+1);break}case'achievement':{[784,988,1175].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.12,now+i*.12);g.gain.exponentialRampToValueAtTime(.001,now+i*.12+.4);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.12);o.stop(now+i*.12+.5)});break}}}catch(e){}}

function getAxe(id){return AXES.find(a=>a.id===id)}

function getLogType(id){return LOG_TYPES.find(l=>l.id===id)||LOG_TYPES[0]}
function getCurrentLogType(){return getLogType(state.currentLogType)}
function getPrestigeMultiplier(){const p=state.prestigeLevel||0;if(p===0)return 1;if(p<=5)return[1,1.5,2,3,4.5,6][p];return 6+(p-5)}
function getAffinityMult(axe,logCat){if(state.isBoss)return 1;if(axe.strongVs==='All')return axe.id==='ehli'?2:1.5;if(axe.strongVs===logCat)return 1.5;if(axe.weakVs===logCat)return 0.6;return 1}
function calcLogHp(level,logType){const lt=logType||getCurrentLogType();return Math.max(3,Math.floor(lt.baseHp*(1+level*0.08)))}
function calcLogCoins(level,logType){const lt=logType||getCurrentLogType();const base=lt.coinMin+Math.floor(Math.random()*(lt.coinMax-lt.coinMin+1));return base+Math.floor(level/20)}
function getLogTypeForLevel(level){const unlocked=LOG_TYPES.filter(lt=>(state.unlockedLogs||['pine']).includes(lt.id));if(unlocked.length===0)return LOG_TYPES[0];const tw=unlocked.reduce((s,lt)=>s+lt.spawnWeight,0);let r=Math.random()*tw;for(const lt of unlocked){r-=lt.spawnWeight;if(r<=0)return lt}return unlocked[unlocked.length-1]}

function getNextUnlockInfo(){for(let i=1;i<LOG_IDS.length;i++){const logId=LOG_IDS[i];if(!state.unlockedLogs.includes(logId)){const lt=LOG_TYPES[i];const prevId=LOG_IDS[i-1];const req=lt.unlockCount;const cur=state.logChopCounts[prevId]||0;return{nextLogId:logId,nextLogType:lt,requiredLogId:prevId,requiredLogType:getLogType(prevId),requiredCount:req,currentCount:cur}}}return null}
function checkLogUnlocks(){for(let i=1;i<LOG_IDS.length;i++){const logId=LOG_IDS[i];if(state.unlockedLogs.includes(logId))continue;const lt=LOG_TYPES[i];const prevId=LOG_IDS[i-1];if((state.logChopCounts[prevId]||0)>=lt.unlockCount){state.unlockedLogs.push(logId);if(!state.discoveredLogs.includes(logId))state.discoveredLogs.push(logId);setTimeout(()=>showUnlockCelebration(lt),500);saveState();updateUnlockProgressBar();break}}}

function resizeGameCanvas(){
  const w=window.innerWidth;const h=window.innerHeight;
  // Set canvas pixel resolution to screen size (capped for perf)
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cW=Math.floor(w*dpr);cH=Math.floor(h*dpr);
  canvas.width=cW;canvas.height=cH;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  // Compute scale: we designed for a 400x400 game scene; map it to fill the screen
  scaleX=cW/400;scaleY=cH/400;
}

// ========== SCENE DRAWING — FULLSCREEN ==========
let fireflies=[];
function initFireflies(){fireflies=[];for(let i=0;i<25;i++)fireflies.push({x:Math.random()*400,y:160+Math.random()*200,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.2,phase:Math.random()*Math.PI*2,size:1+Math.random()*2})}

function drawBackground(){
  ctx.save();
  ctx.scale(scaleX,scaleY);

  const skyGrad=ctx.createLinearGradient(0,0,0,200);
  skyGrad.addColorStop(0,'#0d1b3e');skyGrad.addColorStop(0.3,'#1b3a5c');skyGrad.addColorStop(0.55,'#d4775a');skyGrad.addColorStop(0.7,'#e8a060');skyGrad.addColorStop(1,'#f0c070');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,400,200);

  // Clouds
  const t=Date.now()/40000;
  ctx.fillStyle='rgba(255,255,255,0.15)';
  for(let i=0;i<4;i++){const cx=((t*50+i*130)%(440))-20,cy=20+i*18;ctx.beginPath();ctx.ellipse(cx,cy,40+i*8,8+i*2,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+20,cy-4,22,7,0,0,Math.PI*2);ctx.fill()}

  // Mountains
  ctx.fillStyle='#1a2a3a';ctx.beginPath();ctx.moveTo(0,150);
  for(let x=0;x<=400;x+=20)ctx.lineTo(x,150-Math.sin(x*0.015)*25-Math.sin(x*0.04)*10);
  ctx.lineTo(400,180);ctx.lineTo(0,180);ctx.fill();

  // Hills
  ctx.fillStyle='#14251a';ctx.beginPath();ctx.moveTo(0,170);
  for(let x=0;x<=400;x+=15)ctx.lineTo(x,170-Math.sin(x*0.02+1)*15);
  ctx.lineTo(400,190);ctx.lineTo(0,190);ctx.fill();

  // Trees
  const sway=Math.sin(treeSwayTime)*2;
  drawTree(ctx,20,140,0.7,'#1e4a1e',sway);drawTree(ctx,70,150,0.5,'#1a3e1a',-sway*.8);
  drawTree(ctx,330,135,0.8,'#1e4a1e',sway*.6);drawTree(ctx,370,148,0.55,'#1a3e1a',-sway);
  drawTree(ctx,140,155,0.4,'#1a3e1a',sway*.5);drawTree(ctx,260,145,0.6,'#1e4a1e',-sway*.7);
  drawTree(ctx,390,142,0.65,'#1e4a1e',sway*.4);drawTree(ctx,10,152,0.45,'#1a3e1a',-sway*.6);

  // Ground
  const grassGrad=ctx.createLinearGradient(0,190,0,400);
  grassGrad.addColorStop(0,'#4a8c3f');grassGrad.addColorStop(0.3,'#3d7232');grassGrad.addColorStop(1,'#2d5a27');
  ctx.fillStyle=grassGrad;ctx.fillRect(0,190,400,210);
  for(let i=0;i<40;i++){const gx=(i*27+5)%400;drawPixelRect(ctx,gx,188,4,6,'#5a9e4e');drawPixelRect(ctx,gx+10,190,3,4,'#6db85e')}

  // Flowers
  const fc=['#ff6688','#ffcc33','#88aaff','#ffaa55','#ff88aa'];
  for(let i=0;i<12;i++){const fx=(i*47+20)%400;drawPixelRect(ctx,fx,195+((i*23)%20),3,3,fc[i%fc.length])}

  // Fireflies
  const ft=Date.now()/1000;
  fireflies.forEach(f=>{f.x+=f.vx;f.y+=f.vy;if(f.x<0)f.x=400;if(f.x>400)f.x=0;if(f.y<160)f.vy=Math.abs(f.vy);if(f.y>360)f.vy=-Math.abs(f.vy);const alpha=0.3+Math.sin(ft*2+f.phase)*0.3;ctx.fillStyle=`rgba(255,255,180,${alpha})`;ctx.beginPath();ctx.arc(f.x,f.y,f.size,0,Math.PI*2);ctx.fill()});

  ctx.restore();
}

function drawTree(c,x,y,scale,color,sway){const s=scale,sw=sway||0;drawPixelRect(c,x-4*s,y,8*s,40*s,'#4a2a10');drawPixelRect(c,x-20*s+sw,y-10*s,40*s,16*s,color);drawPixelRect(c,x-16*s+sw,y-24*s,32*s,16*s,color);drawPixelRect(c,x-10*s+sw*1.3,y-34*s,20*s,12*s,color)}

function drawStump(){
  ctx.save();ctx.scale(scaleX,scaleY);
  const sx=175,sy=290;
  ctx.fillStyle='#1a3a1a88';ctx.beginPath();ctx.ellipse(200,335,40,10,0,0,Math.PI*2);ctx.fill();
  drawPixelRect(ctx,sx,sy,50,44,'#5a3a1a');drawPixelRect(ctx,sx+4,sy,42,44,'#6b4226');drawPixelRect(ctx,sx,sy-4,50,8,'#7a5236');drawPixelRect(ctx,sx+8,sy-2,34,4,'#8b5e3c');
  ctx.restore();
}

function drawLog(){
  ctx.save();ctx.scale(scaleX,scaleY);
  if(logSplitAnim>0){drawSplitLogInner();ctx.restore();return}
  const lt=getCurrentLogType();const lx=165,ly=230,w=70,h=60;
  const isBoss=state.isBoss;
  const shakeX=logHitShake>0?Math.sin(logHitShake*30)*(logHitShake*4):0;
  ctx.save();ctx.translate(shakeX,0);
  if(isBoss){ctx.shadowBlur=20+Math.sin(Date.now()/200)*8;ctx.shadowColor='#ff2200'}
  else if(lt.glow){ctx.shadowBlur=15+Math.sin(Date.now()/300)*5;ctx.shadowColor='#aa66ff'}
  const sc=isBoss?1.2:1;const bx=isBoss?lx-7:lx,by=isBoss?ly-6:ly,bw=w*sc,bh=h*sc;
  drawPixelRect(ctx,bx,by,bw,bh,lt.bodyColor);drawPixelRect(ctx,bx+4,by+4,bw-8,bh-8,lt.innerColor);
  drawPixelRect(ctx,bx,by,6,bh,lt.barkColor);drawPixelRect(ctx,bx+bw-6,by,6,bh,lt.barkColor);
  drawPixelRect(ctx,bx+4,by-4,bw-8,10,lt.topColor);drawPixelRect(ctx,bx+10,by-6,bw-20,6,lt.topColor);
  drawPixelRect(ctx,bx+15,by+15,2,20,lt.grainColor);drawPixelRect(ctx,bx+45,by+20,2,18,lt.grainColor);
  ctx.shadowBlur=0;
  if(lt.stripes)for(let i=0;i<4;i++)drawPixelRect(ctx,bx+8+i*14,by+5+i*8,8,3,'#333');
  if(isBoss){ctx.strokeStyle='#ff2200';ctx.lineWidth=3;ctx.strokeRect(bx-2,by-8,bw+4,bh+10)}
  if(logCrackLevel>0.25&&logCrackLevel<=0.5){ctx.strokeStyle='#00000066';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bx+bw/2,by-4);ctx.lineTo(bx+bw/2+2,by+bh*0.3);ctx.stroke()}
  if(logCrackLevel>0.5&&logCrackLevel<=0.75){ctx.strokeStyle='#00000088';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(bx+bw/2,by-4);ctx.lineTo(bx+bw/2-4,by+bh*0.5);ctx.stroke();ctx.strokeStyle='#00000066';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bx+bw/2-4,by+bh*0.3);ctx.lineTo(bx+bw/2-10,by+bh*0.45);ctx.stroke();ctx.beginPath();ctx.moveTo(bx+bw/2+2,by+bh*0.2);ctx.lineTo(bx+bw/2+8,by+bh*0.4);ctx.stroke();drawPixelRect(ctx,bx-2,by+bh-6,4,4,lt.bodyColor)}
  if(logCrackLevel>0.75){ctx.strokeStyle='#000000bb';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(bx+bw/2-1,by-6);ctx.lineTo(bx+bw/2+1,by+bh*0.8);ctx.stroke();ctx.strokeStyle='#000000aa';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(bx+bw/2-8,by+bh*0.3);ctx.lineTo(bx+bw/2-14,by+bh*0.5);ctx.stroke();ctx.beginPath();ctx.moveTo(bx+bw/2+6,by+bh*0.25);ctx.lineTo(bx+bw/2+14,by+bh*0.5);ctx.stroke();ctx.strokeStyle=lt.topColor+'88';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bx+bw/2+1,by-5);ctx.lineTo(bx+bw/2+3,by+bh*0.6);ctx.stroke();drawPixelRect(ctx,bx-3,by+bh-8,5,6,lt.bodyColor);drawPixelRect(ctx,bx+bw-2,by+bh-6,5,5,lt.innerColor)}
  if(lt.glow)for(const sp of enchantedSparkles){ctx.fillStyle=`rgba(170,102,255,${sp.life})`;ctx.fillRect(bx+sp.x,by+sp.y,3,3)}
  if(hitFlash>0){ctx.fillStyle=`rgba(255,255,255,${hitFlash*0.5})`;ctx.fillRect(bx,by-6,bw,bh+6)}
  ctx.restore();ctx.restore();
}

function drawSplitLogInner(){
  const lt=getCurrentLogType();const progress=Math.min(logSplitAnim,1);const lx=165,ly=230,w=70,h=60;
  const spread=progress*60,dropY=progress*progress*50,rot=progress*0.4;
  ctx.save();ctx.translate(lx+w/2-spread/2-20,ly+dropY);ctx.rotate(-rot);
  ctx.globalAlpha=1-progress*0.8;
  drawPixelRect(ctx,0,0,w/2-2,h,lt.bodyColor);drawPixelRect(ctx,0,0,4,h,lt.barkColor);drawPixelRect(ctx,4,4,w/2-10,h-8,lt.innerColor);
  drawPixelRect(ctx,w/2-6,5,3,h-10,lt.grainColor);drawPixelRect(ctx,w/2-8,15,2,10,lt.ringColor);
  ctx.restore();
  ctx.save();ctx.translate(lx+w/2+spread/2-10,ly+dropY);ctx.rotate(rot);
  ctx.globalAlpha=1-progress*0.8;
  drawPixelRect(ctx,0,0,w/2-2,h,lt.bodyColor);drawPixelRect(ctx,w/2-6,0,4,h,lt.barkColor);drawPixelRect(ctx,4,4,w/2-10,h-8,lt.innerColor);
  drawPixelRect(ctx,2,5,3,h-10,lt.grainColor);drawPixelRect(ctx,4,20,2,10,lt.ringColor);
  ctx.globalAlpha=1;ctx.restore();
}

function drawAxeOnCanvas(){

function spawnWoodChips(x,y,count,big){const lt=getCurrentLogType();const colors=lt.particleColors||['#8b5e3c','#b8855a'];for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*(big?12:6),vy:-Math.random()*(big?10:5)-2,size:big?4+Math.random()*6:2+Math.random()*4,color:colors[Math.floor(Math.random()*colors.length)],life:1,gravity:0.3,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.3})}

function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.rotation+=p.rotSpeed;p.life-=dt*1.5;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){ctx.save();ctx.scale(scaleX,scaleY);for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rotation);if(p.isCoin){drawPixelRect(ctx,-2,-2,4,4,'#ffd700');drawPixelRect(ctx,-1,-1,2,2,'#ffe44d')}else drawPixelRect(ctx,-p.size/2,-p.size/2,p.size,p.size,p.color);ctx.restore()}ctx.restore()}

function initLog(){if(shouldSpawnBoss()){initBossLog();return}state.isBoss=false;const lt=getLogTypeForLevel(state.logLevel);state.currentLogType=lt.id;state.maxLogHp=calcLogHp(state.logLevel,lt);state.currentLogHp=state.maxLogHp;logCrackLevel=0;logSplitAnim=0;enchantedSparkles=[];state.chopStartTime=Date.now();if(!state.discoveredLogs.includes(lt.id)){state.discoveredLogs.push(lt.id);setTimeout(()=>{const area=document.getElementById('game-area');const el=document.createElement('div');el.className='discovery-anim font-pixel';el.innerHTML=`<div style="color:#ffd700;font-size:12px;text-shadow:2px 2px 0 #000;">NEW!</div><div style="color:#d4e8c4;font-size:9px;margin-top:4px;">${lt.name.toUpperCase()}</div><div style="color:#8bac6f;font-size:7px;margin-top:2px;">${lt.rarity.toUpperCase()}</div>`;area.appendChild(el);setTimeout(()=>el.remove(),2500);playSound('discover')},300)}updateHpBar();updateLogTypeLabel();updateUnlockProgressBar()}
function chopLog(){if(logSplitAnim>0)return;const axe=getEquippedAxe();const lt=getCurrentLogType();let dmg=axe.damage;let isCrit=false;const affMult=getAffinityMult(axe,lt.category);dmg=Math.max(1,Math.floor(dmg*affMult));if(puState.fury.active)dmg*=3;if(puState.crit.active&&Math.random()<0.5){dmg*=5;isCrit=true;playSound('critical');hitFlash=1.5}state.currentLogHp=Math.max(0,state.currentLogHp-dmg);logCrackLevel=1-(state.currentLogHp/state.maxLogHp);if(!isCrit)hitFlash=1;logHitShake=0.15;axeSwinging=true;axeSwingProgress=0;spawnWoodChips(200,260,isCrit?10:4,isCrit);state.totalChops++;showDamageText(dmg,isCrit);if(affMult!==1)showAffinityIndicator(affMult);playSound('chop');const now=Date.now();if(now-lastChopTime<400){comboCount++;if(comboCount>=2){showCombo(comboCount);if(comboCount>state.highestCombo)state.highestCombo=comboCount}}else comboCount=1;lastChopTime=now;updateHpBar();if(state.currentLogHp<=0)splitLog()}

function renderStats(){const content=document.getElementById('stats-content');content.innerHTML='';document.querySelectorAll('.stat-tab').forEach(t=>{t.classList.remove('gold');if(t.dataset.stab===currentStatTab)t.classList.add('gold')});const pa=document.getElementById('prestige-area');if(canPrestige()){pa.classList.remove('hidden')}else pa.classList.add('hidden');if(currentStatTab==='alltime'){content.innerHTML=`<div class="flex flex-col gap-3"><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">TOTAL LOGS SPLIT</div><div class="font-pixel text-sm" style="color:#d4e8c4;">${state.totalLogsSplit.toLocaleString()}</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">TOTAL COINS EARNED</div><div class="font-pixel text-sm" style="color:#ffd700;">${state.totalCoinsEarned.toLocaleString()}</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">TOTAL CHOPS</div><div class="font-pixel text-sm" style="color:#d4e8c4;">${(state.totalChops||0).toLocaleString()}</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">HIGHEST COMBO</div><div class="font-pixel text-sm" style="color:#ff6622;">${state.highestCombo||0}x</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">BOSS KILLS</div><div class="font-pixel text-sm" style="color:#e74c3c;">${state.bossKills||0}</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">PRESTIGE LEVEL</div><div class="font-pixel text-sm" style="color:#ffd700;">${state.prestigeLevel||0} (${getPrestigeMultiplier()}x coins)</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">TIME PLAYED</div><div class="font-pixel text-sm" style="color:#d4e8c4;">${formatTime(state.timePlayed||0)}</div></div></div>`}else if(currentStatTab==='bests'){content.innerHTML=`<div class="flex flex-col gap-3"><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">BEST COINS FROM LOG</div><div class="font-pixel text-sm" style="color:#ffd700;">${(state.bestCoinsFromLog||0).toLocaleString()}</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">HIGHEST LEVEL</div><div class="font-pixel text-sm" style="color:#d4e8c4;">${state.highestLevel||1}</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">LOGS DISCOVERED</div><div class="font-pixel text-sm" style="color:#d4e8c4;">${(state.discoveredLogs||[]).length}/${LOG_TYPES.length}</div></div><div class="pixel-panel p-3"><div class="font-pixel text-[7px] mb-1" style="color:#8bac6f;">AXES OWNED</div><div class="font-pixel text-sm" style="color:#d4e8c4;">${state.ownedAxes.length}/${AXES.length}</div></div></div>`}else if(currentStatTab==='logs'){let html='<div class="flex flex-col gap-2" style="max-height:50vh;overflow-y:auto;">';LOG_TYPES.forEach((lt,idx)=>{const unlocked=(state.unlockedLogs||['pine']).includes(lt.id);const chopCount=(state.logChopCounts||{})[lt.id]||0;let progressHtml='';if(unlocked&&idx<LOG_TYPES.length-1){const nextLt=LOG_TYPES[idx+1];const nextUnlocked=(state.unlockedLogs||['pine']).includes(nextLt.id);if(!nextUnlocked){const needed=nextLt.unlockCount;const pct=Math.min(100,Math.floor((chopCount/needed)*100));progressHtml=`<div class="mt-2"><div class="font-pixel text-[5px]" style="color:#8bac6f;">→ ${nextLt.name.toUpperCase()} AT ${needed}</div><div class="progress-bar-mini mt-1"><div class="progress-bar-mini-fill" style="width:${pct}%"></div></div></div>`}}html+=`<div class="pixel-panel p-3 collection-item ${unlocked?'':'locked'}"><div class="flex items-center gap-2"><div class="flex-1"><div class="font-pixel text-[7px]" style="color:${unlocked?'#d4e8c4':'#555'}">${lt.name.toUpperCase()}</div><div class="font-pixel text-[5px] mt-1" style="color:${unlocked?'#8bac6f':'#444'}">${lt.rarity} | ${lt.category} | HP:${lt.baseHp} | ${lt.coinMin}-${lt.coinMax}c</div></div><div class="text-right">${unlocked?`<div class="font-pixel text-[6px]" style="color:#4caf50;">✓</div><div class="font-pixel text-[5px]" style="color:#ffd700;">${chopCount} chopped</div>`:`<div class="font-pixel text-[6px]" style="color:#555;">🔒</div>`}</div></div>${progressHtml}</div>`});html+='</div>';content.innerHTML=html}else if(currentStatTab==='axes'){let html='<div class="flex flex-col gap-2" style="max-height:50vh;overflow-y:auto;">';AXES.forEach(axe=>{const owned=state.ownedAxes.includes(axe.id);const equipped=state.equippedAxe===axe.id;html+=`<div class="pixel-panel p-3 collection-item ${owned?'':'locked'}" ${equipped?'style="border-color:#ffd700"':''}><div class="flex items-center gap-2"><div class="flex-1"><div class="font-pixel text-[7px]" style="color:${owned?(axe.glow?'#ff6622':'#d4e8c4'):'#555'}">${axe.name.toUpperCase()}</div><div class="font-pixel text-[5px] mt-1" style="color:${owned?'#8bac6f':'#444'}">DMG:${axe.damage} | +${axe.coinsPerChop} | ${axe.cost.toLocaleString()}c</div><div class="mt-1"><span class="type-badge type-${axe.type}">${axe.type.toUpperCase()}</span></div></div><div class="font-pixel text-[6px]" style="color:${owned?'#4caf50':'#555'}">${owned?(equipped?'EQUIPPED':'OWNED'):'LOCKED'}</div></div></div>`});html+='</div>';content.innerHTML=html}}
function formatTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h>0)return`${h}h ${m}m`;return`${m}m`}

function spawnLeaf(){const c=document.getElementById('leaves-container');if(!c||c.children.length>8)return;const leaf=document.createElement('div');leaf.className='leaf';leaf.style.left=Math.random()*100+'%';leaf.style.top='-10px';const colors=['#6db85e','#4a8c3f','#c88030','#cc4444','#daa520'];leaf.style.background=colors[Math.floor(Math.random()*colors.length)];const sz=4+Math.random()*6;leaf.style.width=sz+'px';leaf.style.height=sz+'px';leaf.style.animation=`leaf-fall ${6+Math.random()*6}s linear forwards`;c.appendChild(leaf);setTimeout(()=>leaf.remove(),12000)}
function updateSoundIcon(){const icon=document.getElementById('sound-icon-lucide');if(icon)icon.setAttribute('data-lucide',soundMuted?'volume-x':'volume-2');try{lucide.createIcons()}catch(e){}}
function updateTitleWelcome(){const el=document.getElementById('title-welcome');if(state.totalLogsSplit>0||state.prestigeLevel>0){el.classList.remove('hidden');el.textContent=`WELCOME BACK, JACOB! LEVEL ${state.logLevel}${state.prestigeLevel>0?' | PRESTIGE '+state.prestigeLevel:''}`}}

// ========== GAME LOOP ==========
let lastTime=0,gameStarted=false,playTimer=0;
function gameLoop(timestamp){
  if(!gameStarted){requestAnimationFrame(gameLoop);return}
  const dt=Math.min((timestamp-lastTime)/1000,0.1);lastTime=timestamp;
  playTimer+=dt;if(playTimer>=10){state.timePlayed=(state.timePlayed||0)+playTimer;playTimer=0}
  if(hitFlash>0)hitFlash-=dt*8;if(hitFlash<0)hitFlash=0;
  if(logHitShake>0)logHitShake-=dt;if(logHitShake<0)logHitShake=0;
  if(axeSwinging){axeSwingProgress+=dt*3.5;if(axeSwingProgress>=1){axeSwinging=false;axeSwingProgress=0}}
  if(logSplitAnim>0&&logSplitAnim<2)logSplitAnim+=dt*2;
  cloudOffset+=dt*8;treeSwayTime+=dt*0.8;
  updateParticles(dt);updateEnchantedSparkles(dt);updatePowerUps(dt);
  // Draw everything on the single fullscreen canvas
  ctx.clearRect(0,0,cW,cH);
  drawBackground();drawStump();drawLog();drawAxeOnCanvas();drawParticles();
  requestAnimationFrame(gameLoop);
}
